<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding RSVP</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background-color: #faf8f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 480px;
            width: 100%;
            border: 1px solid #eae6df;
        }
        h2 { text-align: center; color: #4a5d4e; margin-top: 0; }
        p { text-align: center; font-size: 0.9em; color: #666; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 0.85em; }
        input[type="text"], input[type="email"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95em;
        }
        .radio-group { display: flex; gap: 20px; margin-top: 6px; }
        button {
            width: 100%;
            background-color: #4a5d4e;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #3b4a3e; }
        #statusMessage { margin-top: 15px; text-align: center; font-weight: bold; color: #4a5d4e; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kindly Respond</h2>
    <p>Please submit your RSVP below.</p>

    <form id="rsvpForm">
        <div class="form-group">
            <label for="fullName">Full Name(s)</label>
            <input type="text" id="fullName" name="fullName" required placeholder="Jane & John Doe">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="your.email@example.com">
        </div>

        <div class="form-group">
            <label>Will you be attending?</label>
            <div class="radio-group">
                <label><input type="radio" name="attending" value="Joyfully Accepts" required> Joyfully Accepts</label>
                <label><input type="radio" name="attending" value="Regretfully Declines"> Regretfully Declines</label>
            </div>
        </div>

        <div class="form-group">
            <label for="guests">Number of Guests</label>
            <select id="guests" name="guests">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>

        <div class="form-group">
            <label for="dietary">Dietary Restrictions</label>
            <input type="text" id="dietary" name="dietary" placeholder="Vegetarian, Allergies, etc.">
        </div>

        <div class="form-group">
            <label for="song">Song Request</label>
            <input type="text" id="song" name="song" placeholder="Your favorite party song">
        </div>

        <button type="submit" id="submitBtn">Submit RSVP</button>
    </form>
    <div id="statusMessage"></div>
</div>

<script>
    const scriptURL = https://script.google.com/macros/s/AKfycbw8bDVoh130b_dDm9GctjfaHRyiZGAIzX7pJGTpaFJieRcpT2vG8UkF5xpdP_ouBXqL/exec;
    const form = document.getElementById('rsvpForm');
    const statusMsg = document.getElementById('statusMessage');

    form.addEventListener('submit', e => {
        e.preventDefault();
        statusMsg.innerText = 'Sending your response...';
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form) })
            .then(response => {
                statusMsg.innerText = 'Thank you! Your RSVP has been received.';
                form.reset();
            })
            .catch(error => {
                statusMsg.innerText = 'Error sending response. Please try again.';
                console.error('Error!', error.message);
            });
    });
</script>

</body>
</html>
