<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فرح علي و سارة | Aly & Sarah's Wedding</title>
  
  <!-- Fonts: Arslan Wessam Calligraphy & Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Arslan Wessam Web Font Integration */
    @font-face {
      font-family: 'Arslan Wessam A';
      src: url('https://fonts.cdnfonts.com/s/73173/ArslanWessamA.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --card-bg: rgba(255, 255, 255, 0.94);
      --primary-color: #8c4a57; /* Rich Dusty Rose / Berry */
      --primary-hover: #733b46;
      --text-main: #2d2325;
      --text-muted: #6b5c60;
      --accent-rose: #b87380;
      --accent-gold: #c9935f; /* Warm Gold */
      --border-color: #ebd3d8;
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Arslan Wessam A', 'Aref Ruqaa', serif; 
      
      /* Rich Romantic Gradient Background */
      background: linear-gradient(135deg, #fce8ec 0%, #f5d4dc 40%, #eabcc7 75%, #ebd8cb 100%);
      background-attachment: fixed;
      
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 50px 20px;
    }

    /* Expanded Container for Spacing & Breathability */
    .container {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 2px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 30px 60px rgba(140, 74, 87, 0.18);
      border-radius: var(--radius);
      padding: 60px 50px 50px;
      max-width: 680px; /* Increased from 540px */
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Soft Corner Accents */
    .decor {
      position: absolute;
      font-size: 2rem;
      user-select: none;
      pointer-events: none;
      opacity: 0.85;
    }
    .top-left { top: 20px; left: 20px; transform: rotate(-20deg); }
    .top-right { top: 20px; right: 20px; transform: rotate(20deg); }
    .bottom-left { bottom: 20px; left: 20px; transform: rotate(15deg); }
    .bottom-right { bottom: 20px; right: 20px; transform: rotate(-15deg); }

    /* Prominent Hero Photo */
    .photo-container {
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
    }

    .hero-photo {
      width: 220px; /* Scaled up from 150px */
      height: 220px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid var(--accent-gold);
      box-shadow: 0 12px 28px rgba(140, 74, 87, 0.22);
      transition: transform 0.4s ease;
    }

    .hero-photo:hover {
      transform: scale(1.02);
    }

    .names-header {
      margin-bottom: 30px;
    }

    .names-header h2 {
      font-size: 2rem;
      color: var(--accent-gold);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .names-header h1.arabic-names {
      font-size: 4rem; /* Prominent Calligraphy Heading */
      color: var(--primary-color);
      line-height: 1.25;
      font-weight: 700;
    }

    .names-header h1.english-names {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: var(--accent-rose);
      font-weight: 600;
      margin-top: 8px;
      text-transform: uppercase;
    }

    /* Elegant Divider Line */
    .header-divider {
      width: 120px;
      height: 3px;
      background-color: var(--accent-gold);
      margin: 30px auto;
      border-radius: 3px;
    }

    /* Location Box */
    .location-box {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--border-color);
      border-radius: 18px;
      padding: 28px 24px;
      margin-bottom: 35px;
      text-align: center;
      box-shadow: 0 6px 20px rgba(140, 74, 87, 0.06);
    }

    .location-title {
      font-size: 1.5rem;
      color: var(--primary-color);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .location-venue {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 18px;
    }

    .maps-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 28px;
      background-color: #ffffff;
      color: var(--primary-color);
      border: 2px solid var(--primary-color);
      border-radius: 12px;
      font-family: 'Montserrat', 'Cairo', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(140, 74, 87, 0.08);
    }

    .maps-button:hover {
      background-color: var(--primary-color);
      color: #ffffff;
      transform: translateY(-2px);
    }

    h3.rsvp-title {
      font-size: 2.5rem;
      color: var(--text-main);
      margin-bottom: 8px;
      font-weight: 700;
    }

    p.subtitle {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 35px;
      font-style: italic;
    }

    form {
      text-align: right;
    }

    .form-group {
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--primary-color);
    }
    
    label .en {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-right: 8px;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 16px 20px;
      border: 1.5px solid var(--border-color);
      border-radius: 14px;
      font-family: 'Arslan Wessam A', 'Aref Ruqaa', serif;
      font-size: 1.25rem;
      background: #ffffff;
      transition: all 0.3s ease;
      outline: none;
      color: var(--text-main);
    }

    input:focus,
    select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(140, 74, 87, 0.15);
    }

    .radio-group {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }

    .radio-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      border: 1.5px solid var(--border-color);
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .radio-option:hover {
      border-color: var(--primary-color);
      background-color: rgba(140, 74, 87, 0.04);
    }

    .radio-option input[type="radio"] {
      accent-color: var(--primary-color);
      width: 22px;
      height: 22px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 18px;
      background-color: var(--primary-color);
      color: #ffffff;
      border: none;
      border-radius: 14px;
      font-family: 'Arslan Wessam A', 'Aref Ruqaa', serif;
      font-size: 1.6rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(140, 74, 87, 0.25);
    }

    button[type="submit"]:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }

    button[type="submit"]:active {
      transform: scale(0.99);
    }

    /* Closing Message */
    .closing-message {
      margin-top: 40px;
      padding-top: 25px;
      border-top: 1px stroke var(--border-color);
      font-size: 1.5rem;
      color: var(--primary-color);
      font-weight: 700;
      line-height: 1.4;
    }

    .closing-message .heart {
      color: #e26d7c;
      display: inline-block;
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      .container { padding: 45px 25px 35px; }
      .hero-photo { width: 170px; height: 170px; }
      .names-header h1.arabic-names { font-size: 3.2rem; }
      .names-header h1.english-names { font-size: 1.6rem; }
      .radio-group { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <span class="decor top-left">🦋🌺</span>
    <span class="decor top-right">🌸🦋</span>
    <span class="decor bottom-left">🌸🍃</span>
    <span class="decor bottom-right">🍃🦋</span>

    <!-- Prominent Hero Photo -->
    <div class="photo-container">
      <img src="./WhatsApp%20Image%202026-07-23%20at%201.04.38%20PM.jpeg" alt="Aly & Sarah" class="hero-photo">
    </div>

    <div class="names-header">
      <h2>فرح / Wedding</h2>
      <h1 class="arabic-names">علي و سارة</h1>
      <h1 class="english-names">Aly & Sarah</h1>
    </div>

    <div class="header-divider"></div>

    <!-- Location Box -->
    <div class="location-box">
      <div class="location-title">المكان والعنوان / Venue & Location</div>
      <div class="location-venue">فيلا لا ريفا (Villa La Riva)</div>
      <a href="https://maps.app.goo.gl/pXPJq47gDfPK4TQu7" target="_blank" rel="noopener noreferrer" class="maps-button">
        🗺️ فتح على خرائط جوجل / Google Maps
      </a>
    </div>

    <h3 class="rsvp-title">يسعدنا حضوركم!</h3>
    <p class="subtitle">Please let us know if you can join us.</p>

    <form id="rsvpForm">
      <div class="form-group">
        <label for="fullName">الاسم بالكامل <span class="en">/ Full Name</span></label>
        <input type="text" id="fullName" placeholder="اسمك الكريم" required>
      </div>

      <div class="form-group">
        <label>هل ستتمكن من الحضور؟ <span class="en">/ Will you attend?</span></label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="attending" value="yes" required> نعم
          </label>
          <label class="radio-option">
            <input type="radio" name="attending" value="no"> للأسف، لا أستطيع الحضور
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="guests">عدد الأفراد <span class="en">/ Number of Guests</span></label>
        <select id="guests">
          <option value="1">فرد واحد (1)</option>
          <option value="2">فردين (2)</option>
          <option value="3">3 أفراد (3)</option>
          <option value="4">4 أفراد (4)</option>
        </select>
      </div>

      <button type="submit">تأكيد الحضور / Submit RSVP</button>
    </form>

    <div class="closing-message">
      مش هتكمل فرحتنا غير بوجودكم معانا! <span class="heart">💖</span>
    </div>
  </div>

</body>
</html>
