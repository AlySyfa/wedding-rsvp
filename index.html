<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فرح علي و سارة | Aly & Sarah's Wedding</title>
  
  <!-- Fonts: Arslan Wessam Calligraphy & Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* Arslan Wessam Web Font Integration */
    @font-face {
      font-family: 'Arslan Wessam A';
      src: url('https://fonts.cdnfonts.com/s/73173/ArslanWessamA.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --card-bg: rgba(255, 255, 255, 0.92);
      --primary-color: #9e5b68; /* Rose Plum / Dusty Rose */
      --primary-hover: #824753;
      --text-main: #3a2e31;
      --text-muted: #78686c;
      --accent-rose: #c88a95; /* Soft Berry Accent */
      --accent-gold: #d4a373; /* Warm Rose Gold */
      --border-color: #f0d8dd;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Arslan Wessam A', 'Aref Ruqaa', serif; 
      
      /* Vibrant Romantic Floral/Blush Gradient Background */
      background: linear-gradient(135deg, #fce4e8 0%, #f3d2d9 40%, #e8bac4 75%, #ebd8cb 100%);
      background-attachment: fixed;
      
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 2px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 25px 50px rgba(158, 91, 104, 0.2);
      border-radius: var(--radius);
      padding: 50px 40px 40px;
      max-width: 540px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Decorative Corner Accents */
    .decor {
      position: absolute;
      font-size: 1.6rem;
      user-select: none;
      pointer-events: none;
    }
    .top-left { top: 12px; left: 15px; transform: rotate(-20deg); }
    .top-right { top: 12px; right: 15px; transform: rotate(20deg); }
    .bottom-left { bottom: 12px; left: 15px; transform: rotate(15deg); }
    .bottom-right { bottom: 12px; right: 15px; transform: rotate(-15deg); }

    .names-header {
      margin-bottom: 25px;
    }

    .names-header h2 {
      font-size: 1.6rem;
      color: var(--accent-gold);
      font-weight: 600;
      margin-bottom: 5px;
    }

    .names-header h1.arabic-names {
      font-size: 3.2rem;
      color: var(--primary-color);
      line-height: 1.2;
      font-weight: 700;
    }

    .names-header h1.english-names {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--accent-rose);
      font-weight: 500;
      margin-top: 5px;
    }

    /* Clean Divider Line */
    .header-divider {
      width: 80px;
      height: 2px;
      background-color: var(--accent-gold);
      margin: 25px auto;
      border-radius: 2px;
    }

    /* Location Card Section */
    .location-box {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 30px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(158, 91, 104, 0.05);
    }

    .location-title {
      font-size: 1.3rem;
      color: var(--primary-color);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .location-venue {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 14px;
    }

    .maps-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      background-color: #ffffff;
      color: var(--primary-color);
      border: 1.5px solid var(--primary-color);
      border-radius: 8px;
      font-family: 'Montserrat', 'Cairo', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .maps-button:hover {
      background-color: var(--primary-color);
      color: #ffffff;
    }

    h3.rsvp-title {
      font-size: 2rem;
      color: var(--text-main);
      margin-bottom: 5px;
      font-weight: 700;
    }

    p.subtitle {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-style: italic;
    }

    form {
      text-align: right;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--primary-color);
    }
    
    label .en {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-right: 6px;
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-family: 'Arslan Wessam A', 'Aref Ruqaa', serif;
      font-size: 1.05rem;
      background: #ffffff;
      transition: all 0.3s ease;
      outline: none;
      color: var(--text-main);
    }

    input[type="email"] {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      direction: ltr;
      text-align: left;
    }

    input:focus,
    select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(158, 91, 104, 0.15);
    }

    .radio-group {
      display: flex;
      gap: 12px;
      margin-top: 5px;
    }

    .radio-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .radio-option:hover {
      border-color: var(--primary-color);
      background-color: rgba(158, 91, 104, 0.04);
    }

    .radio-option input[type="radio"] {
      accent-color: var(--primary-color);
      width: 18px;
      height: 18px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background-color: var(--primary-color);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: 'Arslan Wessam A', 'Aref Ruqaa', serif;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.1s ease;
      margin-top: 15px;
    }

    button[type="submit"]:hover {
      background-color: var(--primary-hover);
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }

    /* Closing Message */
    .closing-message {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px stroke var(--border-color);
      font-size: 1.25rem;
      color: var(--primary-color);
      font-weight: 700;
      line-height: 1.4;
    }

    .closing-message .heart {
      color: #e26d7c;
      display: inline-block;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .container { padding: 40px 22px 30px; }
      .names-header h1.arabic-names { font-size: 2.6rem; }
      .radio-group { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <span class="decor top-left">🦋🌺</span>
    <span class="decor top-right">🌸🦋</span>
    <span class="decor bottom-left">🌸🍃</span>
    <span class="decor bottom-right">🍃🦋</span>

    <div class="names-header">
      <h2>فرح / Wedding</h2>
      <h1 class="arabic-names">علي و سارة</h1>
      <h1 class="english-names">Aly & Sarah</h1>
    </div>

    <div class="header-divider"></div>

    <!-- Location Section -->
    <div class="location-box">
      <div class="location-title">المكان والعنوان / Venue & Location</div>
      <div class="location-venue">فيلا لا ريفا (Villa La Riva)</div>
      <a href="https://maps.app.goo.gl/pXPJq47gDfPK4TQu7" target="_blank" rel="noopener noreferrer" class="maps-button">
        🗺️ فتح على خرائط جوجل / Google Maps
      </a>
    </div>

    <h3 class="rsvp-title">يسعدنا حضوركم!</h3>
    <p class="subtitle">Please let us know if you can join us.</p>

    <form id="rsvpForm">
      <div class="form-group">
        <label for="fullName">الاسم بالكامل <span class="en">/ Full Name</span></label>
        <input type="text" id="fullName" placeholder="اسمك الكريم" required>
      </div>

      <div class="form-group">
        <label for="email">البريد الإلكتروني <span class="en">/ Email Address</span></label>
        <input type="email" id="email" placeholder="your.email@example.com" required>
      </div>

      <div class="form-group">
        <label>هل ستتمكن من الحضور؟ <span class="en">/ Will you attend?</span></label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="attending" value="yes" required> نعم
          </label>
          <label class="radio-option">
            <input type="radio" name="attending" value="no"> للأسف، لا أستطيع الحضور
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="guests">عدد الأفراد <span class="en">/ Number of Guests</span></label>
        <select id="guests">
          <option value="1">فرد واحد (1)</option>
          <option value="2">فردين (2)</option>
          <option value="3">3 أفراد (3)</option>
          <option value="4">4 أفراد (4)</option>
        </select>
      </div>

      <button type="submit">تأكيد الحضور / Submit RSVP</button>
    </form>

    <div class="closing-message">
      مش هتكمل فرحتنا غير بوجودكم معانا! <span class="heart">💖</span>
    </div>
  </div>

</body>
</html>
