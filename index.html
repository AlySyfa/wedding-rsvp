<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حفل زفاف علي و سارة | Aly & Sarah</title>
  
  <!-- Premium Editorial Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* Arslan Wessam Web Font Integration */
    @font-face {
      font-family: 'Arslan Wessam A';
      src: url('https://fonts.cdnfonts.com/s/73173/ArslanWessamA.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      /* Candlelight & Floral Palette */
      --primary-color: #7A303A; /* Deep Floral Rose / Burgundy */
      --primary-hover: #5c222b;
      --accent-gold: #DEB068; /* Warm Candlelight Gold */
      --text-main: #362A28; /* Warm Charcoal */
      --text-muted: #7A6966;
      --border-color: #E6D8D4;
      --input-bg: #FCF9F7; /* Soft cream */
      --card-bg: #FFFFFF;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      /* Ambient Candle-lit Background */
      background: radial-gradient(circle at top, #FDF9F2 0%, #F5EAE1 50%, #EADAD0 100%);
      background-attachment: fixed;
      color: var(--text-main);
      font-family: 'Amiri', serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    /* Edge-to-Edge Wrapper */
    .wedding-wrapper {
      background: var(--card-bg);
      max-width: 620px;
      width: 100%;
      box-shadow: 0 30px 60px rgba(122, 48, 58, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      overflow: hidden; /* Crucial for edge-to-edge image */
      position: relative;
    }

    /* --- Integrated Hero Image --- */
    .hero-section {
      width: 100%;
      position: relative;
      background-color: #000;
    }

    .hero-photo {
      width: 100%;
      height: 480px;
      object-fit: cover;
      display: block;
      /* This creates the beautiful fade into the white card */
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
    }

    /* Pull content up into the faded area */
    .content-padding {
      padding: 0 45px 60px 45px;
      margin-top: -60px; 
      position: relative;
      z-index: 2;
    }

    /* --- Floral SVG Accents --- */
    .floral-accent {
      display: block;
      margin: 0 auto 15px;
      width: 80px;
      height: auto;
      fill: var(--accent-gold);
      opacity: 0.8;
    }

    /* --- Typography --- */
    .names-header {
      margin-bottom: 40px;
      text-align: center;
    }

    .names-header h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-bottom: 15px;
      /* Candle glow effect */
      text-shadow: 0 0 12px rgba(222, 176, 104, 0.4); 
    }

    .names-header h1.arabic-names {
      font-size: 3.8rem;
      color: var(--primary-color);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 5px;
    }

    .names-header h1.english-names {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--primary-color);
      font-weight: 400;
      font-style: italic;
    }

    /* --- Location Details --- */
    .details-section {
      text-align: center;
      margin-bottom: 45px;
      padding-top: 20px;
    }

    .details-section h3 {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-gold);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .venue-name {
      font-size: 1.9rem;
      color: var(--text-main);
      margin-bottom: 15px;
      font-weight: 700;
    }

    .maps-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: var(--primary-color);
      text-decoration: none;
      border-bottom: 1.5px solid var(--primary-color);
      padding-bottom: 4px;
      font-weight: 600;
      transition: opacity 0.3s ease;
      text-transform: uppercase;
    }

    .maps-link:hover {
      opacity: 0.7;
    }

    /* --- RSVP Form --- */
    .rsvp-header {
      text-align: center;
      font-size: 2.6rem;
      color: var(--primary-color);
      margin-bottom: 5px;
      font-weight: 700;
    }

    .rsvp-subtitle {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--accent-gold);
      margin-bottom: 35px;
      font-size: 1.3rem;
    }

    form {
      text-align: right;
    }

    .form-group {
      margin-bottom: 30px;
    }

    /* Highlighted labels */
    label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-main);
      margin-bottom: 12px;
    }

    label .ar {
      font-family: 'Amiri', serif;
      font-size: 1.25rem;
      margin-left: 8px;
      letter-spacing: 0;
      text-transform: none;
      color: var(--primary-color);
      font-weight: 700;
    }

    /* Obvious, Boxy Inputs */
    input[type="text"],
    select {
      width: 100%;
      padding: 16px 20px;
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      background: var(--input-bg);
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: var(--text-main);
      outline: none;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
      transition: all 0.3s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--primary-color);
      background: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(122, 48, 58, 0.12);
    }

    /* Custom Select Arrow */
    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237A303A' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: left 15px center;
      background-size: 18px;
      padding-left: 45px;
    }

    /* Obvious Radio Card Boxes */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Amiri', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-main);
      cursor: pointer;
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      padding: 18px 20px;
      background: var(--input-bg);
      transition: all 0.3s ease;
    }

    .radio-option:hover {
      border-color: var(--primary-color);
      background: #FFFFFF;
    }

    .radio-option input[type="radio"] {
      appearance: none;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-color);
      border-radius: 50%;
      outline: none;
      cursor: pointer;
      position: relative;
      background: #FFFFFF;
      transition: all 0.2s ease;
    }

    .radio-option input[type="radio"]:checked {
      border-color: var(--primary-color);
      background: var(--primary-color);
    }

    .radio-option input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #FFFFFF;
    }

    /* Solid Minimalist Button */
    button[type="submit"] {
      width: 100%;
      padding: 20px;
      background-color: var(--primary-color);
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.1s ease;
      margin-top: 15px;
      box-shadow: 0 10px 25px rgba(122, 48, 58, 0.3);
    }

    button[type="submit"]:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }
    
    button[type="submit"]:active {
      transform: scale(0.99);
    }

    .closing-message {
      text-align: center;
      margin-top: 50px;
      font-family: 'Amiri', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    @media (max-width: 600px) {
      body { padding: 15px; }
      .content-padding { padding: 0 25px 40px 25px; }
      .hero-photo { height: 400px; }
      .names-header h1.arabic-names { font-size: 3.2rem; }
      .names-header h1.english-names { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="wedding-wrapper">
    
    <!-- Integrated Edge-to-Edge Fading Hero Image -->
    <div class="hero-section">
      <img src="./WhatsApp%20Image%202026-07-23%20at%201.04.38%20PM.jpeg" alt="Aly & Sarah" class="hero-photo">
    </div>

    <!-- Inner Content Wrapper -->
    <div class="content-padding">
      
      <div class="names-header">
        <!-- SVG Floral Branch Accent -->
        <svg class="floral-accent" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
          <path d="M50,15 C40,5 30,25 20,15 C10,5 0,25 0,15 M50,15 C60,5 70,25 80,15 C90,5 100,25 100,15" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <circle cx="50" cy="15" r="3" fill="currentColor"/>
          <path d="M20,15 Q15,5 25,10 Z M80,15 Q85,5 75,10 Z M35,17 Q30,27 40,22 Z M65,17 Q70,27 60,22 Z" fill="currentColor"/>
        </svg>
        
        <h2>حفل زفاف | Wedding Celebration</h2>
        <h1 class="arabic-names">علي و سارة</h1>
        <h1 class="english-names">Aly & Sarah</h1>
      </div>

      <div class="details-section">
        <h3>Venue <span style="font-family: 'Amiri', serif; font-size: 1.2rem; color: var(--primary-color); text-transform: none; margin-right: 5px;">المكان</span></h3>
        <div class="venue-name">فيلا لا ريفا (Villa La Riva)</div>
        <a href="https://maps.app.goo.gl/pXPJq47gDfPK4TQu7" target="_blank" rel="noopener noreferrer" class="maps-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          View on Google Maps
        </a>
      </div>

      <div class="rsvp-section">
        <!-- Elegant Candle SVG -->
        <svg class="floral-accent" style="width: 30px; margin-top: 15px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 22h4 M12 22V10 M9 10h6v12H9z M12 10s-2-3-1-5c1-2 3-1 2 2-1 2-1 3-1 3z"></path>
        </svg>

        <h2 class="rsvp-header">يسعدنا حضوركم</h2>
        <p class="rsvp-subtitle">Kindly Reply</p>

        <form id="rsvpForm">
          <div class="form-group">
            <label for="fullName">Full Name <span class="ar">الاسم بالكامل</span></label>
            <input type="text" id="fullName" placeholder="اسمك الكريم" required>
          </div>

          <div class="form-group">
            <label>Will you attend? <span class="ar">هل ستتمكن من الحضور؟</span></label>
            <div class="radio-group">
              <label class="radio-option">
                <input type="radio" name="attending" value="yes" required> نعم
              </label>
              <label class="radio-option">
                <input type="radio" name="attending" value="no"> للأسف، لا أستطيع الحضور
              </label>
            </div>
          </div>

          <div class="form-group">
            <label for="guests">Number of Guests <span class="ar">عدد الأفراد</span></label>
            <select id="guests">
              <option value="1">فرد واحد (1)</option>
              <option value="2">فردين (2)</option>
              <option value="3">3 أفراد (3)</option>
              <option value="4">4 أفراد (4)</option>
            </select>
          </div>

          <!-- NEW: Guest Details Input -->
          <div class="form-group">
            <label for="guestDetails">Guest Names & Relations <span class="ar">أسماء وصلة القرابة للمرافقين</span></label>
            <input type="text" id="guestDetails" placeholder="مثال: أحمد (زوج)، ليلى (ابنة) | Example: Ahmed (Husband)">
          </div>

          <button type="submit">Submit RSVP</button>
        </form>
      </div>

      <div class="closing-message">
        مش هتكمل فرحتنا غير بوجودكم معانا! 
      </div>

    </div>
  </div>

</body>
</html>
