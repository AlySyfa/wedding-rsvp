<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حفل زفاف علي و سارة | Aly & Sarah</title>
  
  <!-- Premium Editorial Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #F9F8F6; /* Alabaster / Warm White */
      --primary-color: #946E6B; /* Elegant Muted Rose / Taupe */
      --text-main: #3C3532; /* Soft Charcoal */
      --text-muted: #7A726E;
      --border-color: #D4C9C3;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Amiri', serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Main Editorial Wrapper */
    .wedding-wrapper {
      background: #FFFFFF;
      max-width: 600px;
      width: 100%;
      margin: 40px 20px;
      padding: 60px 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
      border: 1px solid #EAE3DE;
      position: relative;
    }

    /* --- Hero Image (Editorial Arch) --- */
    .hero-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .hero-photo {
      width: 100%;
      max-width: 320px;
      height: 420px;
      object-fit: cover;
      /* The modern arch crop */
      border-radius: 200px 200px 10px 10px;
      margin: 0 auto 30px;
      display: block;
      box-shadow: 0 15px 30px rgba(148, 110, 107, 0.15);
      border: 1px solid #F3EDE9;
    }

    /* --- Typography --- */
    .names-header {
      margin-bottom: 40px;
      text-align: center;
    }

    .names-header h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 15px;
    }

    .names-header h1.arabic-names {
      font-size: 3.5rem;
      color: var(--primary-color);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 5px;
    }

    .names-header h1.english-names {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--primary-color);
      font-weight: 400;
      font-style: italic;
    }

    .divider {
      width: 1px;
      height: 60px;
      background-color: var(--border-color);
      margin: 0 auto 40px;
    }

    /* --- Location Details --- */
    .details-section {
      text-align: center;
      margin-bottom: 50px;
    }

    .details-section h3 {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .venue-name {
      font-size: 1.8rem;
      color: var(--text-main);
      margin-bottom: 15px;
      font-weight: 400;
    }

    .maps-link {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: var(--primary-color);
      text-decoration: none;
      border-bottom: 1px solid var(--primary-color);
      padding-bottom: 2px;
      transition: opacity 0.3s ease;
      text-transform: uppercase;
    }

    .maps-link:hover {
      opacity: 0.7;
    }

    /* --- RSVP Form --- */
    .rsvp-header {
      text-align: center;
      font-size: 2.2rem;
      color: var(--primary-color);
      margin-bottom: 5px;
    }

    .rsvp-subtitle {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--text-muted);
      margin-bottom: 35px;
      font-size: 1.1rem;
    }

    form {
      text-align: right;
    }

    .form-group {
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-main);
      margin-bottom: 10px;
    }

    label .ar {
      font-family: 'Amiri', serif;
      font-size: 1.1rem;
      margin-left: 8px;
      letter-spacing: 0;
      text-transform: none;
      color: var(--primary-color);
    }

    /* Minimalist Underline Inputs */
    input[type="text"],
    select {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-bottom: 1px solid var(--border-color);
      background: transparent;
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: var(--text-main);
      outline: none;
      border-radius: 0; /* Override iOS styling */
      transition: border-color 0.3s ease;
    }

    input:focus,
    select:focus {
      border-bottom-color: var(--primary-color);
    }

    /* Custom Select Arrow Styling */
    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237A726E' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: left 0 center;
      background-size: 16px;
      padding-left: 20px;
    }

    /* Elegant Radio Buttons */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 15px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: var(--text-main);
      cursor: pointer;
    }

    .radio-option input[type="radio"] {
      appearance: none;
      width: 20px;
      height: 20px;
      border: 1px solid var(--border-color);
      border-radius: 50%;
      outline: none;
      cursor: pointer;
      position: relative;
      background: transparent;
      transition: all 0.2s ease;
    }

    .radio-option input[type="radio"]:checked {
      border-color: var(--primary-color);
    }

    .radio-option input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary-color);
    }

    /* Solid Minimalist Button */
    button[type="submit"] {
      width: 100%;
      padding: 16px;
      background-color: var(--text-main);
      color: #FFFFFF;
      border: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-top: 20px;
    }

    button[type="submit"]:hover {
      background-color: var(--primary-color);
    }

    .closing-message {
      text-align: center;
      margin-top: 50px;
      font-family: 'Amiri', serif;
      font-size: 1.4rem;
      color: var(--primary-color);
    }

    @media (max-width: 600px) {
      .wedding-wrapper { margin: 0; padding: 40px 25px; border: none; box-shadow: none; }
      .hero-photo { height: 350px; }
      .names-header h1.arabic-names { font-size: 3rem; }
      .names-header h1.english-names { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="wedding-wrapper">
    
    <div class="hero-section">
      <!-- Your image applied to the modern editorial arch -->
      <img src="./WhatsApp%20Image%202026-07-23%20at%201.04.38%20PM.jpeg" alt="Aly & Sarah" class="hero-photo">
    </div>

    <div class="names-header">
      <h2>Wedding Celebration</h2>
      <h1 class="arabic-names">علي و سارة</h1>
      <h1 class="english-names">Aly & Sarah</h1>
    </div>

    <div class="divider"></div>

    <div class="details-section">
      <h3>Venue</h3>
      <div class="venue-name">فيلا لا ريفا (Villa La Riva)</div>
      <a href="https://maps.app.goo.gl/pXPJq47gDfPK4TQu7" target="_blank" rel="noopener noreferrer" class="maps-link">
        View on Google Maps
      </a>
    </div>

    <div class="divider"></div>

    <div class="rsvp-section">
      <h2 class="rsvp-header">يسعدنا حضوركم</h2>
      <p class="rsvp-subtitle">Kindly Reply</p>

      <form id="rsvpForm">
        <div class="form-group">
          <label for="fullName">Full Name <span class="ar">الاسم بالكامل</span></label>
          <input type="text" id="fullName" required>
        </div>

        <div class="form-group">
          <label>Will you attend? <span class="ar">هل ستتمكن من الحضور؟</span></label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="attending" value="yes" required> نعم
            </label>
            <label class="radio-option">
              <input type="radio" name="attending" value="no"> للأسف، لا أستطيع الحضور
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="guests">Number of Guests <span class="ar">عدد الأفراد</span></label>
          <select id="guests">
            <option value="1">فرد واحد (1)</option>
            <option value="2">فردين (2)</option>
            <option value="3">3 أفراد (3)</option>
            <option value="4">4 أفراد (4)</option>
          </select>
        </div>

        <button type="submit">Submit RSVP</button>
      </form>
    </div>

    <div class="closing-message">
      مش هتكمل فرحتنا غير بوجودكم معانا!
    </div>

  </div>

</body>
</html>
