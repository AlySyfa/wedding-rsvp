<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حفل زفاف علي و سارة | Aly & Sarah</title>
  
  <!-- Premium Editorial Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-color: #946E6B; /* Elegant Muted Rose / Taupe */
      --primary-hover: #7a5856;
      --text-main: #3C3532; /* Soft Charcoal */
      --text-muted: #7A726E;
      --border-color: #d8cec8;
      --input-bg: #FAF6F5; /* Very soft tinted box background */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      /* Vibrant but elegant blush-to-champagne gradient background */
      background: linear-gradient(135deg, #f2d5d9 0%, #fae6e9 40%, #eed6cc 100%);
      background-attachment: fixed;
      color: var(--text-main);
      font-family: 'Amiri', serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    /* Main Editorial Wrapper with subtle glass effect */
    .wedding-wrapper {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      max-width: 600px;
      width: 100%;
      padding: 60px 45px;
      box-shadow: 0 25px 50px rgba(148, 110, 107, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 20px;
      position: relative;
    }

    /* --- Hero Image (Editorial Arch) --- */
    .hero-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .hero-photo {
      width: 100%;
      max-width: 300px;
      height: 400px;
      object-fit: cover;
      /* The modern arch crop */
      border-radius: 200px 200px 12px 12px;
      margin: 0 auto 30px;
      display: block;
      box-shadow: 0 15px 35px rgba(148, 110, 107, 0.25);
      border: 4px solid #FFFFFF;
    }

    /* --- Typography --- */
    .names-header {
      margin-bottom: 40px;
      text-align: center;
    }

    .names-header h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 15px;
    }

    .names-header h1.arabic-names {
      font-size: 3.6rem;
      color: var(--primary-color);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 5px;
    }

    .names-header h1.english-names {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--primary-color);
      font-weight: 400;
      font-style: italic;
    }

    /* --- Location Details --- */
    .details-section {
      text-align: center;
      margin-bottom: 50px;
    }

    .details-section h3 {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .venue-name {
      font-size: 1.8rem;
      color: var(--text-main);
      margin-bottom: 15px;
      font-weight: 700;
    }

    .maps-link {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: var(--primary-color);
      text-decoration: none;
      border-bottom: 1px solid var(--primary-color);
      padding-bottom: 2px;
      font-weight: 600;
      transition: opacity 0.3s ease;
      text-transform: uppercase;
    }

    .maps-link:hover {
      opacity: 0.7;
    }

    /* --- RSVP Form --- */
    .rsvp-header {
      text-align: center;
      font-size: 2.4rem;
      color: var(--primary-color);
      margin-bottom: 5px;
      font-weight: 700;
    }

    .rsvp-subtitle {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--text-muted);
      margin-bottom: 35px;
      font-size: 1.2rem;
    }

    form {
      text-align: right;
    }

    .form-group {
      margin-bottom: 30px;
    }

    /* Highlighted labels */
    label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-main);
      margin-bottom: 12px;
    }

    label .ar {
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      margin-left: 8px;
      letter-spacing: 0;
      text-transform: none;
      color: var(--primary-color);
      font-weight: 700;
    }

    /* Obvious, Boxy Inputs */
    input[type="text"] {
      width: 100%;
      padding: 16px 20px;
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      background: var(--input-bg);
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: var(--text-main);
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: var(--primary-color);
      background: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(148, 110, 107, 0.15);
    }

    /* Obvious Radio Card Boxes */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-main);
      cursor: pointer;
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      padding: 16px 20px;
      background: var(--input-bg);
      transition: all 0.3s ease;
    }

    .radio-option:hover {
      border-color: var(--primary-color);
      background: #FFFFFF;
    }

    .radio-option input[type="radio"] {
      appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid var(--border-color);
      border-radius: 50%;
      outline: none;
      cursor: pointer;
      position: relative;
      background: #FFFFFF;
      transition: all 0.2s ease;
    }

    .radio-option input[type="radio"]:checked {
      border-color: var(--primary-color);
      background: var(--primary-color);
    }

    .radio-option input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FFFFFF;
    }

    /* Solid Minimalist Button */
    button[type="submit"] {
      width: 100%;
      padding: 18px;
      background-color: var(--primary-color);
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.1s ease;
      margin-top: 10px;
      box-shadow: 0 8px 20px rgba(148, 110, 107, 0.3);
    }

    button[type="submit"]:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }
    
    button[type="submit"]:active {
      transform: scale(0.99);
    }

    .closing-message {
      text-align: center;
      margin-top: 50px;
      font-family: 'Amiri', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    @media (max-width: 600px) {
      body { padding: 15px; }
      .wedding-wrapper { padding: 40px 25px; border-radius: 16px; }
      .hero-photo { height: 340px; }
      .names-header h1.arabic-names { font-size: 3rem; }
      .names-header h1.english-names { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="wedding-wrapper">
    
    <div class="hero-section">
      <img src="./WhatsApp%20Image%202026-07-23%20at%201.04.38%20PM.jpeg" alt="Aly & Sarah" class="hero-photo">
    </div>

    <div class="names-header">
      <h2>Wedding Celebration</h2>
      <h1 class="arabic-names">علي و سارة</h1>
      <h1 class="english-names">Aly & Sarah</h1>
    </div>

    <div class="details-section">
      <h3>Venue <span style="font-family: 'Amiri', serif; font-size: 1.1rem; color: var(--primary-color); text-transform: none; margin-right: 5px;">المكان</span></h3>
      <div class="venue-name">فيلا لا ريفا (Villa La Riva)</div>
      <a href="https://maps.app.goo.gl/pXPJq47gDfPK4TQu7" target="_blank" rel="noopener noreferrer" class="maps-link">
        View on Google Maps
      </a>
    </div>

    <div class="rsvp-section">
      <h2 class="rsvp-header">يسعدنا حضوركم</h2>
      <p class="rsvp-subtitle">Kindly Reply</p>

      <form id="rsvpForm">
        <div class="form-group">
          <label for="fullName">Full Name <span class="ar">الاسم بالكامل</span></label>
          <input type="text" id="fullName" placeholder="اسمك الكريم" required>
        </div>

        <div class="form-group">
          <label>Will you attend? <span class="ar">هل ستتمكن من الحضور؟</span></label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="attending" value="نعم" required> نعم
            </label>
            <label class="radio-option">
              <input type="radio" name="attending" value="للأسف، لا أستطيع الحضور"> للأسف، لا أستطيع الحضور
            </label>
          </div>
        </div>

        <button type="submit">Submit RSVP</button>
      </form>
    </div>

    <div class="closing-message">
      مش هتكمل فرحتنا غير بوجودكم معانا!
    </div>

  </div>

  <script>
    const scriptURL = 'YOUR_APPS_SCRIPT_WEB_URL_HERE';
    const form = document.getElementById('rsvpForm');

    form.addEventListener('submit', e => {
      e.preventDefault();
      
      const formData = {
        fullName: document.getElementById('fullName').value,
        attending: document.querySelector('input[name="attending"]:checked').value
      };

      fetch(scriptURL, { 
        method: 'POST', 
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      })
      .then(() => {
        alert('تم إرسال ردك بنجاح! شكراً لك.');
        form.reset();
      })
      .catch(error => console.error('Error!', error.message));
    });
  </script>

</body>
</html>
