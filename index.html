<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حفل زفاف علي و سارة | Aly & Sarah</title>
  
  <!-- Ultra-Premium Editorial Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-stone: #EFECE6; /* Sophisticated Stone/Linen */
      --card-white: #FFFFFF;
      --text-dark: #1C1B1A; /* Off-black for softer contrast */
      --text-muted: #6B6863;
      --accent-taupe: #9E9689;
      --border-thin: #E0DDD8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-stone);
      color: var(--text-dark);
      font-family: 'Amiri', 'Playfair Display', serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 20px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Minimalist Gallery Matting */
    .wedding-wrapper {
      background: var(--card-white);
      max-width: 640px;
      width: 100%;
      padding: 80px 60px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.04);
      position: relative;
    }

    /* --- Editorial Portrait --- */
    .hero-section {
      text-align: center;
      margin-bottom: 50px;
      position: relative;
    }

    .hero-photo {
      width: 100%;
      max-width: 380px;
      height: 500px;
      object-fit: cover;
      display: block;
      margin: 0 auto;
      /* Fine Art Inner Frame Effect */
      outline: 1px solid var(--border-thin);
      outline-offset: -12px;
      filter: contrast(1.05) sepia(0.05); /* Very slight warm/film tint */
    }

    /* --- High-End Typography --- */
    .names-header {
      margin-bottom: 50px;
      text-align: center;
    }

    .names-header h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 25px;
      font-weight: 400;
    }

    .names-header h1.arabic-names {
      font-size: 3.5rem;
      color: var(--text-dark);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .names-header h1.english-names {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: var(--text-dark);
      font-weight: 400;
      font-style: italic;
    }

    /* Minimalist Divider */
    .divider {
      width: 40px;
      height: 1px;
      background-color: var(--accent-taupe);
      margin: 0 auto 50px;
    }

    /* --- Venue Details --- */
    .details-section {
      text-align: center;
      margin-bottom: 60px;
    }

    .details-section h3 {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 15px;
      font-weight: 400;
    }

    .venue-name {
      font-size: 1.6rem;
      color: var(--text-dark);
      margin-bottom: 20px;
      font-weight: 400;
    }

    .maps-link {
      display: inline-block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--text-dark);
      text-decoration: none;
      border-bottom: 1px solid var(--text-dark);
      padding-bottom: 4px;
      transition: color 0.3s ease, border-color 0.3s ease;
      text-transform: uppercase;
    }

    .maps-link:hover {
      color: var(--accent-taupe);
      border-color: var(--accent-taupe);
    }

    /* --- Haute Couture RSVP Form --- */
    .rsvp-header {
      text-align: center;
      font-size: 2rem;
      color: var(--text-dark);
      margin-bottom: 10px;
      font-weight: 400;
    }

    .rsvp-subtitle {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--text-muted);
      margin-bottom: 45px;
      font-size: 1.1rem;
    }

    form {
      text-align: right;
    }

    .form-group {
      margin-bottom: 40px;
    }

    label {
      display: block;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    label .ar {
      font-family: 'Amiri', serif;
      font-size: 1rem;
      margin-left: 10px;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text-dark);
    }

    /* Elegant Line Inputs (No Boxes) */
    input[type="text"],
    select {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-bottom: 1px solid var(--border-thin);
      background: transparent;
      font-family: 'Amiri', serif;
      font-size: 1.3rem;
      color: var(--text-dark);
      outline: none;
      border-radius: 0;
      transition: border-color 0.4s ease;
    }

    input:focus,
    select:focus {
      border-bottom-color: var(--text-dark);
    }

    input::placeholder {
      color: #C0BBB4;
      font-style: italic;
    }

    /* Minimal Select Arrow */
    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231C1B1A' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: left 0 center;
      background-size: 14px;
      padding-left: 20px;
      cursor: pointer;
    }

    /* Restrained Radio Buttons */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 15px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 15px;
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      color: var(--text-dark);
      cursor: pointer;
    }

    .radio-option input[type="radio"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid var(--accent-taupe);
      border-radius: 50%;
      outline: none;
      cursor: pointer;
      position: relative;
      background: transparent;
      transition: all 0.3s ease;
    }

    .radio-option input[type="radio"]:checked {
      border-color: var(--text-dark);
    }

    .radio-option input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dark);
    }

    /* Stark, Modern Submit Button */
    button[type="submit"] {
      width: 100%;
      padding: 20px;
      background-color: var(--text-dark);
      color: var(--card-white);
      border: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.4s ease;
      margin-top: 20px;
    }

    button[type="submit"]:hover {
      background-color: var(--accent-taupe);
    }

    .closing-message {
      text-align: center;
      margin-top: 60px;
      font-family: 'Amiri', serif;
      font-size: 1.4rem;
      color: var(--text-dark);
      font-style: italic;
    }

    @media (max-width: 600px) {
      body { padding: 0; background-color: var(--card-white); }
      .wedding-wrapper { padding: 40px 25px 60px; box-shadow: none; max-width: 100%; }
      .hero-photo { height: 420px; }
      .names-header h1.arabic-names { font-size: 3rem; }
      .names-header h1.english-names { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="wedding-wrapper">
    
    <div class="hero-section">
      <!-- Portrait framing with subtle inner matte line -->
      <img src="./WhatsApp%20Image%202026-07-23%20at%201.04.38%20PM.jpeg" alt="Aly & Sarah" class="hero-photo">
    </div>

    <div class="names-header">
      <h2>Wedding Celebration</h2>
      <h1 class="arabic-names">علي و سارة</h1>
      <h1 class="english-names">Aly & Sarah</h1>
    </div>

    <div class="divider"></div>

    <div class="details-section">
      <h3>Venue <span style="font-family: 'Amiri', serif; font-size: 1.1rem; color: var(--text-dark); text-transform: none; margin-right: 8px;">المكان</span></h3>
      <div class="venue-name">فيلا لا ريفا (Villa La Riva)</div>
      <a href="https://maps.app.goo.gl/pXPJq47gDfPK4TQu7" target="_blank" rel="noopener noreferrer" class="maps-link">
        View on Google Maps
      </a>
    </div>

    <div class="divider"></div>

    <div class="rsvp-section">
      <h2 class="rsvp-header">يسعدنا حضوركم</h2>
      <p class="rsvp-subtitle">Kindly Reply</p>

      <form id="rsvpForm">
        <div class="form-group">
          <label for="fullName">Full Name <span class="ar">الاسم بالكامل</span></label>
          <input type="text" id="fullName" placeholder="اسمك الكريم" required>
        </div>

        <div class="form-group">
          <label>Will you attend? <span class="ar">هل ستتمكن من الحضور؟</span></label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="attending" value="yes" required> نعم
            </label>
            <label class="radio-option">
              <input type="radio" name="attending" value="no"> للأسف، لا أستطيع الحضور
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="guests">Number of Guests <span class="ar">عدد الأفراد</span></label>
          <select id="guests">
            <option value="1">فرد واحد (1)</option>
            <option value="2">فردين (2)</option>
            <option value="3">3 أفراد (3)</option>
            <option value="4">4 أفراد (4)</option>
          </select>
        </div>

        <button type="submit">Submit RSVP</button>
      </form>
    </div>

    <div class="closing-message">
      مش هتكمل فرحتنا غير بوجودكم معانا
    </div>

  </div>

</body>
</html>
