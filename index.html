<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دعوة زفاف علي و سارة | Wedding RSVP</title>
  
  <!-- Google Fonts: Amiri (Arabic Serif) & Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Palette: Sage, Cream, Gold, and a soft blush */
      --bg-color: #f4f1ea; /* Soft cream/parchment */
      --card-bg: rgba(255, 255, 255, 0.92);
      --primary-color: #556b2f; /* Darker Sage Green */
      --primary-hover: #3e4f22;
      --text-main: #2c302e;
      --text-muted: #666;
      --accent-gold: #c5a059; /* Muted gold */
      --border-color: #d8e0d3;
      --radius: 15px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      /* Arabic font first */
      font-family: 'Amiri', serif; 
      background-color: var(--bg-color);
      
      /* Garden & Butterfly Background Pattern */
      /* Base: Subtle Dots */
      background-image: 
        radial-gradient(rgba(85, 107, 47, 0.1) 1px, transparent 1px),
        /* Pattern Overlay (SVG encoded floral/butterfly placeholder) */
        url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c5a059' fill-opacity='0.08' fill-rule='evenodd'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43 0c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 64c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z'/%3E%3C/g%3E%3C/svg%3E");
      background-size: 24px 24px, 80px 80px;
      
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 18px 40px rgba(85, 107, 47, 0.1);
      border-radius: var(--radius);
      padding: 50px 40px;
      max-width: 550px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Decorative corner elements (Butterflies) */
    .container::before, .container::after {
      content: '🦋';
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.15;
    }
    .container::before { top: 15px; right: 15px; transform: rotate(-15deg); }
    .container::after { bottom: 15px; left: 15px; transform: rotate(15deg); }

    .names-header {
      margin-bottom: 30px;
    }

    .names-header h2 {
      font-weight: 400;
      color: var(--accent-gold);
      font-size: 1.6rem;
      margin-bottom: 5px;
    }

    .names-header h1 {
      font-weight: 700;
      color: var(--primary-color);
      font-size: 3rem;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    .header-divider {
      width: 60px;
      height: 1px;
      background-color: var(--border-color);
      margin: 20px auto;
      position: relative;
    }
    .header-divider::after {
      content: '🌿';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      padding: 0 10px;
      font-size: 1rem;
      color: var(--primary-color);
      opacity: 0.6;
    }

    h3.rsvp-title {
      font-size: 1.5rem;
      color: var(--text-main);
      margin-bottom: 10px;
    }

    p.subtitle {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 35px;
      font-style: italic;
    }

    form {
      text-align: right;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 9px;
      color: var(--primary-color);
    }
    
    label .en {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-right: 8px;
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-family: 'Amiri', serif;
      font-size: 1rem;
      background: #ffffff;
      transition: all 0.3s ease;
      outline: none;
      color: var(--text-main);
    }

    /* English inputs use Montserrat */
    input[type="email"] {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      direction: ltr;
      text-align: left;
    }

    input:focus,
    select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(85, 107, 47, 0.1);
    }

    .radio-group {
      display: flex;
      gap: 15px;
      margin-top: 5px;
    }

    .radio-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .radio-option:hover {
      border-color: var(--primary-color);
      background-color: rgba(85, 107, 47, 0.02);
    }

    .radio-option input[type="radio"] {
      accent-color: var(--primary-color);
      width: 18px;
      height: 18px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 16px;
      background-color: var(--primary-color);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: 'Amiri', serif;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.1s ease;
      margin-top: 15px;
    }

    button[type="submit"]:hover {
      background-color: var(--primary-hover);
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }
    
    @media (max-width: 480px) {
      .container { padding: 35px 25px; }
      .names-header h1 { font-size: 2.4rem; }
      .radio-group { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="names-header">
      <h2>زفاف | Wedding</h2>
      <h1>علي و سارة</h1>
      <h1>Ali & Sarah</h1>
    </div>

    <div class="header-divider"></div>

    <h3 class="rsvp-title">تأكيد الحضور</h3>
    <p class="subtitle">Kindly respond by submitting your details below.</p>

    <form id="rsvpForm">
      <div class="form-group">
        <label for="fullName">الاسم الكامل <span class="en">/ Full Name</span></label>
        <input type="text" id="fullName" placeholder="فلان الفلاني" required>
      </div>

      <div class="form-group">
        <label for="email">البريد الإلكتروني <span class="en">/ Email Address</span></label>
        <input type="email" id="email" placeholder="your.email@example.com" required>
      </div>

      <div class="form-group">
        <label>هل ستتمكن من الحضور؟ <span class="en">/ Will you attend?</span></label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="attending" value="yes" required> شرف لي الحضور
          </label>
          <label class="radio-option">
            <input type="radio" name="attending" value="no"> للأسف لا أستطيع
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="guests">عدد المرافقين <span class="en">/ Number of Guests</span></label>
        <select id="guests">
          <option value="1">شخص واحد (1)</option>
          <option value="2">شخصين (2)</option>
          <option value="3">ثلاثة أشخاص (3)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="dietary">القيود الغذائية (إن وجدت) <span class="en">/ Dietary Restrictions</span></label>
        <input type="text" id="dietary" placeholder="حساسية، نباتي، إلخ.">
      </div>

      <div class="form-group">
        <label for="song">اقتراح أغنية <span class="en">/ Song Request</span></label>
        <input type="text" id="song" placeholder="أغنيتك المفضلة للحفل">
      </div>

      <button type="submit">إرسال الرد / Submit RSVP</button>
    </form>
  </div>

</body>
</html>
