<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فرح علي و سارة | Aly & Sarah's Wedding</title>
  
  <!-- Google Fonts: Cairo & Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #f5f2eb;
      --card-bg: rgba(255, 255, 255, 0.94);
      --primary-color: #4a5d4e; /* Sage Green */
      --primary-hover: #36453a;
      --text-main: #2c302e;
      --text-muted: #666;
      --accent-gold: #c5a059;
      --border-color: #d8e0d3;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Cairo', sans-serif; 
      background-color: var(--bg-color);
      
      /* Rich Garden & Butterfly Background Pattern */
      background-image: 
        radial-gradient(rgba(85, 107, 47, 0.12) 1.5px, transparent 1.5px),
        url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c5a059' fill-opacity='0.09' fill-rule='evenodd'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43 0c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3z'/%3E%3C/g%3E%3C/svg%3E");
      background-size: 24px 24px, 80px 80px;
      
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 20px 45px rgba(74, 93, 78, 0.12);
      border-radius: var(--radius);
      padding: 50px 40px 40px;
      max-width: 540px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Floral and Butterfly Decorative Accents */
    .decor {
      position: absolute;
      font-size: 1.6rem;
      user-select: none;
      pointer-events: none;
    }
    .top-left { top: 12px; left: 15px; transform: rotate(-20deg); }
    .top-right { top: 12px; right: 15px; transform: rotate(20deg); }
    .bottom-left { bottom: 12px; left: 15px; transform: rotate(15deg); }
    .bottom-right { bottom: 12px; right: 15px; transform: rotate(-15deg); }

    .names-header {
      margin-bottom: 25px;
    }

    .names-header h2 {
      font-size: 1.6rem;
      color: var(--accent-gold);
      font-weight: 600;
      margin-bottom: 5px;
    }

    .names-header h1.arabic-names {
      font-size: 2.8rem;
      color: var(--primary-color);
      line-height: 1.2;
      font-weight: 700;
    }

    .names-header h1.english-names {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: var(--primary-color);
      font-weight: 500;
      margin-top: 5px;
    }

    .header-divider {
      width: 80px;
      height: 1px;
      background-color: var(--accent-gold);
      margin: 20px auto;
      position: relative;
    }
    .header-divider::after {
      content: '🌸 🦋 🌸';
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      padding: 0 10px;
      font-size: 0.9rem;
    }

    h3.rsvp-title {
      font-size: 1.8rem;
      color: var(--text-main);
      margin-bottom: 5px;
      font-weight: 700;
    }

    p.subtitle {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 30px;
      font-style: italic;
    }

    form {
      text-align: right;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--primary-color);
    }
    
    label .en {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-right: 6px;
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      background: #ffffff;
      transition: all 0.3s ease;
      outline: none;
      color: var(--text-main);
    }

    input[type="email"] {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      direction: ltr;
      text-align: left;
    }

    input:focus,
    select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(74, 93, 78, 0.12);
    }

    .radio-group {
      display: flex;
      gap: 12px;
      margin-top: 5px;
    }

    .radio-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .radio-option:hover {
      border-color: var(--primary-color);
      background-color: rgba(74, 93, 78, 0.03);
    }

    .radio-option input[type="radio"] {
      accent-color: var(--primary-color);
      width: 18px;
      height: 18px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background-color: var(--primary-color);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.1s ease;
      margin-top: 15px;
    }

    button[type="submit"]:hover {
      background-color: var(--primary-hover);
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }

    /* Sweet Cute Closing Message */
    .closing-message {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px stroke var(--border-color);
      font-size: 1.15rem;
      color: var(--primary-color);
      font-weight: 700;
      line-height: 1.4;
    }

    .closing-message .heart {
      color: #d9534f;
      display: inline-block;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .container { padding: 40px 22px 30px; }
      .names-header h1.arabic-names { font-size: 2.3rem; }
      .radio-group { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Garden & Butterfly Corner Decors -->
    <span class="decor top-left">🦋🌺</span>
    <span class="decor top-right">🌸🦋</span>
    <span class="decor bottom-left">🌸🍃</span>
    <span class="decor bottom-right">🍃🦋</span>

    <div class="names-header">
      <h2>فرح / Wedding</h2>
      <h1 class="arabic-names">علي و سارة</h1>
      <h1 class="english-names">Aly & Sarah</h1>
    </div>

    <div class="header-divider"></div>

    <h3 class="rsvp-title">هتنورونا وتفرحونا!</h3>
    <p class="subtitle">Please let us know if you can join us.</p>

    <form id="rsvpForm">
      <div class="form-group">
        <label for="fullName">الاسم بالكامل <span class="en">/ Full Name</span></label>
        <input type="text" id="fullName" placeholder="اسمك الكريم" required>
      </div>

      <div class="form-group">
        <label for="email">البريد الإلكتروني <span class="en">/ Email Address</span></label>
        <input type="email" id="email" placeholder="your.email@example.com" required>
      </div>

      <div class="form-group">
        <label>هتقدر تيجي؟ <span class="en">/ Will you attend?</span></label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="attending" value="yes" required> نعم
          </label>
          <label class="radio-option">
            <input type="radio" name="attending" value="no"> للأسف مش هقدر
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="guests">عدد الأفراد <span class="en">/ Number of Guests</span></label>
        <select id="guests">
          <option value="1">فرد واحد (1)</option>
          <option value="2">فردين (2)</option>
          <option value="3">3 أفراد (3)</option>
          <option value="4">4 أفراد (4)</option>
        </select>
      </div>

      <button type="submit">تأكيد الحضور / Submit RSVP</button>
    </form>

    <div class="closing-message">
      مش هتكمل فرحتنا غير بوجودكم معانا! <span class="heart">💖</span>
    </div>
  </div>

</body>
</html>
