<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kindly Respond</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #f7f6f2;
      --card-bg: rgba(255, 255, 255, 0.85);
      --primary-color: #4a5d4e; /* Elegant Sage Green */
      --primary-hover: #38473c;
      --text-color: #2c302e;
      --accent-color: #d4af37; /* Soft Gold Accent */
      --border-color: #e2e8f0;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-color);
      background-image: radial-gradient(#e5e3dc 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
      border-radius: var(--radius);
      padding: 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .header-divider {
      width: 50px;
      height: 2px;
      background-color: var(--accent-color);
      margin: 15px auto 25px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 600;
      color: var(--primary-color);
      letter-spacing: 0.5px;
    }

    p.subtitle {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 25px;
      font-style: italic;
    }

    form {
      text-align: left;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: var(--text-color);
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      background: #ffffff;
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(74, 93, 78, 0.15);
    }

    .radio-group {
      display: flex;
      gap: 15px;
      margin-top: 5px;
    }

    .radio-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .radio-option:hover {
      border-color: var(--primary-color);
    }

    .radio-option input[type="radio"] {
      accent-color: var(--primary-color);
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background-color: var(--primary-color);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.1s ease;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      background-color: var(--primary-hover);
    }

    button[type="submit"]:active {
      transform: scale(0.99);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Kindly Respond</h1>
    <div class="header-divider"></div>
    <p class="subtitle">Please submit your RSVP details below.</p>

    <form id="rsvpForm">
      <div class="form-group">
        <label for="fullName">Full Name(s)</label>
        <input type="text" id="fullName" placeholder="Jane & John Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your.email@example.com" required>
      </div>

      <div class="form-group">
        <label>Will you be attending?</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="attending" value="yes" required> Joyfully Accepts
          </label>
          <label class="radio-option">
            <input type="radio" name="attending" value="no"> Regretfully Declines
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="guests">Number of Guests</label>
        <select id="guests">
          <option value="1">1 Guest</option>
          <option value="2">2 Guests</option>
          <option value="3">3 Guests</option>
        </select>
      </div>

      <div class="form-group">
        <label for="dietary">Dietary Restrictions</label>
        <input type="text" id="dietary" placeholder="Vegetarian, Allergies, etc.">
      </div>

      <div class="form-group">
        <label for="song">Song Request</label>
        <input type="text" id="song" placeholder="Your favorite party song">
      </div>

      <button type="submit">Submit RSVP</button>
    </form>
  </div>

</body>
</html>
